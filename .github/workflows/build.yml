name: Dayanc Yeni GNav App Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo Kodlarini Cek
        uses: actions/checkout@v4

      - name: Java Kurulumu (Guncel v4)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter Kurulumu (Guncel v2)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter Yapısını Sıfırdan Üret
        run: |
          flutter create --project-name=gnav_yeni_uygulama --org com.dayanc.gnav2 .

      - name: pubspec.yaml Dosyasını Otomatik Yaz
        run: |
          cat << 'EOF' > pubspec.yaml
          name: gnav_yeni_uygulama
          description: "Dayanc Yeni GNav Tasarimi"
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            google_nav_bar: ^5.0.6

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          EOF

      - name: main.dart Dosyasını Otomatik Yaz (Senin Son Kodun)
        run: |
          mkdir -p lib
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:google_nav_bar/google_nav_bar.dart';

          void main() {
            runApp(const MaterialApp(home: HomePage()));
          }

          class HomePage extends StatefulWidget {
            const HomePage({super.key});

            @override
            State<HomePage> createState() => _HomePageState();
          }

          class _HomePageState extends State<HomePage> {
            int _selectedIndex = 0;

            final List<Widget> _pages = [
              const Center(child: Text('1. Sayfa İçeriği')),
              const Center(child: Text('2. Sayfa İçeriği')),
            ];

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: _pages[_selectedIndex],
                bottomNavigationBar: GNav(
                  color: Colors.red,
                  tabBorder: Border.all(color: Colors.grey, width: 1),
                  tabActiveBorder: Border.all(color: Colors.purple, width: 1),
                  tabBorderRadius: BorderRadius.circular(15),
                  tabBackgroundColor: Colors.white.withOpacity(0.1),
                  selectedIndex: _selectedIndex,
                  onTabChange: (index) {
                    setState(() {
                      _selectedIndex = index;
                    });
                  },
                  tabs: const [
                    GButton(icon: Icons.home, text: 'Ana Sayfa'),
                    GButton(icon: Icons.search, text: 'Arama'),
                  ],
                ),
              );
            }
          }
          EOF

      - name: Kütüphaneleri İndir
        run: flutter pub get

      - name: Sorunsuz APK Derle
        run: flutter build apk --release

      - name: APK Dosyasını Çıktı Olarak Ver (Guncel v4)
        uses: actions/upload-artifact@v4
        with:
          name: Dayanc-Yeni-GNav-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          
