name: Flutter APK Builder

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Depoyu çek
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Flutter'ı kur
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      # 3. Sıfırdan temiz proje oluştur, senin kodlarını içine at
      - name: Create fresh project
        run: |
          flutter create temp_app
          cp -r lib/ temp_app/
          cp pubspec.yaml temp_app/
          # Eğer assets klasörün varsa onu da kopyala
          if [ -d "assets" ]; then cp -r assets/ temp_app/; fi

      # 🔥 YENİ ADIM: İnternet İznini temp_app içindeki Android dosyasına otomatik yaz
      - name: Inject Android Internet Permission
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' temp_app/android/app/src/main/AndroidManifest.xml

      # 4. Bağımlılıkları yükle ve APK'yı derle
      - name: Build APK
        run: |
          cd temp_app
          flutter pub get
          flutter build apk --release

      # 5. APK dosyasını GitHub üzerinden indirilebilir hale getir
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Uygulamam-APK
          path: temp_app/build/app/outputs/flutter-apk/app-release.apk
          
