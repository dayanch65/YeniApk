name: Dayanc Telsiz App Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # fallbacklar: subosito action tipik olarak ANDROID_SDK_ROOT ayarlar
      ANDROID_HOME: ${{ env.ANDROID_HOME }}
      ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Show environment & Flutter info (diagnostic)
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=${ANDROID_HOME:-not-set}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-not-set}"
          flutter --version
          flutter doctor -v

      - name: Create Flutter project (if missing) / ensure android folder
        run: |
          flutter create . --force --org com.dayanc.telsiz
          ls -la

      - name: Accept Android SDK licenses (best-effort)
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT:-$ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ -x "$SDKMANAGER" ]; then
            yes | "$SDKMANAGER" --licenses || true
          else
            echo "sdkmanager not found at $SDKMANAGER - skipping license accept (may be fine)."
          fi

      - name: Debug - show AndroidManifest before modification
        run: |
          if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
            echo "---- AndroidManifest.xml (first 200 lines) ----"
            sed -n '1,200p' android/app/src/main/AndroidManifest.xml || true
            echo "---- end ----"
          else
            echo "AndroidManifest.xml not found yet."
          fi

      - name: Safely inject required Android permissions (if missing)
        run: |
          python3 - <<'PY'
          import sys, io, os
          path = "android/app/src/main/AndroidManifest.xml"
          if not os.path.exists(path):
              print("SKIP: AndroidManifest.xml not found at", path)
              sys.exit(0)
          with open(path, "r", encoding="utf-8") as f:
              content = f.read()
          # quick check: if permission already present skip
          if "android.permission.RECORD_AUDIO" in content:
              print("Permissions already present, skipping injection.")
              sys.exit(0)
          permissions = (
              '    <uses-permission android:name="android.permission.INTERNET"/>\n'
              '    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n'
              '    <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>\n'
              '    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n'
          )
          # Insert permissions before the first <application ...> tag (safe)
          idx = content.find("<application")
          if idx != -1:
              new = content[:idx] + permissions + content[idx:]
              with open(path, "w", encoding="utf-8") as f:
                  f.write(new)
              print("Permissions injected before <application> tag.")
          else:
              # Fallback: try to insert right after opening <manifest ...> tag end '>'
              # Find end of the first <manifest ...> start tag
              mstart = content.find("<manifest")
              if mstart != -1:
                  mend = content.find(">", mstart)
                  if mend != -1:
                      new = content[:mend+1] + "\n" + permissions + content[mend+1:]
                      with open(path, "w", encoding="utf-8") as f:
                          f.write(new)
                      print("Permissions injected after <manifest> tag (fallback).")
                      sys.exit(0)
              print("WARNING: Could not find <application> or <manifest> tag; file left unchanged.")
          PY

      - name: Debug - show AndroidManifest after modification
        run: |
          if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
            echo "---- AndroidManifest.xml (first 200 lines) AFTER ----"
            sed -n '1,200p' android/app/src/main/AndroidManifest.xml || true
            echo "---- end ----"
          else
            echo "AndroidManifest.xml not found."
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release
        # Eğer çok uzun sürerse isterseniz timeout ekleyebilirsiniz

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Dayanc-Telsiz-SMS-Uygulamasi
          path: build/app/outputs/flutter-apk/app-release.apk
