name: Flutter 3.7.12 Android Cache Builder
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Tam Olarak 3.7.12 Sürümünü Indir
        shell: pwsh
        run: git clone https://github.com/flutter/flutter.git -b 3.7.12 C:\flutter

      - name: Sadece Android Eksik Dosyalarini Yukle
        shell: pwsh
        run: |
          cd C:\flutter
          .\bin\flutter.bat precache --android

      - name: Sadece Eksik Olan Cache Klasorunu ZIP Yap
        shell: pwsh
        run: Compress-Archive -Path C:\flutter\bin\cache -DestinationPath C:\flutter_3.7.12_cache.zip

      - name: Sadece Cache Paketini Sun
        uses: actions/upload-artifact@v4
        with:
          name: flutter-3-7-12-cache
          path: C:\flutter_3.7.12_cache.zip
          
