name: Flutter APK Uretici

on:
  push:
    branches: [ "master" ] # Senin deponun adı master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodlari Cek
        # v3'tü, GitHub'ın istediği gibi v4 yaptık
        uses: actions/checkout@v4 

      - name: Java Kurulumu
        # v3'tü, uyumlu olması için v4 yaptık
        uses: actions/setup-java@v4 
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter Kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Android Dosyalarini Olustur
        run: flutter create --platforms=android .

      - name: Min SDK Versiyonunu 24 Yap
        run: sed -i 's/flutter.minSdkVersion/24/g' android/app/build.gradle

      - name: Izinleri Ekle (Internet ve Mikrofon)
        run: |
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.RECORD_AUDIO"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>' android/app/src/main/AndroidManifest.xml

      - name: Paketleri Indir
        run: flutter pub get

      - name: APK Derle
        run: flutter build apk --release

      - name: APK'yi Github'a Yukle
        # İŞTE HATA VEREN YER BURASIYDI, v4 OLARAK GÜNCELLEDİK
        uses: actions/upload-artifact@v4 
        with:
          name: SesliArama-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          
