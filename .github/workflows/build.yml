name: Dayanc Kesin Calisan App Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo Kodlarini Cek
        uses: actions/checkout@v4

      - name: Java Kurulumu (Guncel v4)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter Kurulumu (Guncel v2)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter Yapısını Sıfırdan Üret
        run: |
          flutter create --project-name=nav_uygulamasi --org com.dayanc.nav --force .

      - name: pubspec.yaml Dosyasını Yaz
        run: |
          cat << 'EOF' > pubspec.yaml
          name: nav_uygulamasi
          description: "Dayanc GNav Navigation App"
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            google_nav_bar: ^5.0.6

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          EOF

      - name: main.dart Dosyasını Yaz (Senin Tasarımın)
        run: |
          mkdir -p lib
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:google_nav_bar/google_nav_bar.dart';

          void main() {
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                theme: ThemeData.dark().copyWith(
                  scaffoldBackgroundColor: const Color(0xFF0A0A0A),
                  appBarTheme: const AppBarTheme(backgroundColor: Color(0xFF141415)),
                ),
                home: const AnaEkran(),
              );
            }
          }

          class AnaEkran extends StatefulWidget {
            const AnaEkran({super.key});

            @override
            State<AnaEkran> createState() => _AnaEkranState();
          }

          class _AnaEkranState extends State<AnaEkran> {
            int _secilenIndeks = 0;

            final List<Widget> _sayfalar = [
              const Center(child: Text('Ana Sayfa Icerigi', style: TextStyle(fontSize: 20, color: Colors.white))),
              const Center(child: Text('Yuklenenler Sayfasi Icerigi', style: TextStyle(fontSize: 20, color: Colors.white))),
            ];

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: const Text('Dayanc GNav Projesi'),
                  centerTitle: true,
                ),
                body: _sayfalar[_secilenIndeks],
                bottomNavigationBar: SafeArea(
                  child: Container(
                    margin: const EdgeInsets.all(12),
                    decoration: BoxDecoration(
                      color: Colors.red,
                      borderRadius: BorderRadius.circular(20),
                    ),
                    child: GNav(
                      mainAxisAlignment: MainAxisAlignment.center,
                      color: Colors.white,
                      activeColor: Colors.black,
                      gap: 10,
                      padding: const EdgeInsets.all(10),
                      selectedIndex: _secilenIndeks,
                      onTabChange: (index) {
                        setState(() {
                          _secilenIndeks = index;
                        });
                      },
                      tabs: const [
                        GButton(
                          icon: Icons.home,
                          text: 'ana sayfa',
                        ),
                        GButton(
                          icon: Icons.download,
                          text: 'yuklenenler sayfasi',
                        ),
                      ],
                    ),
                  ),
                ),
              );
            }
          }
          EOF

      - name: Android SDK Derleme Ayarını Düzelt
        run: |
          python3 - << 'EOF'
          import os
          path = "android/app/build.gradle"
          if os.path.exists(path):
              with open(path, "r") as f:
                  content = f.read()
              content = content.replace("minSdkVersion flutter.minSdkVersion", "minSdkVersion 21")
              content = content.replace("minSdkVersion = flutter.minSdkVersion", "minSdkVersion = 21")
              with open(path, "w") as f:
                  f.write(content)
          EOF

      - name: Kütüphaneleri İndir
        run: flutter pub get

      - name: Sorunsuz APK Derle
        run: flutter build apk --release

      - name: APK Dosyasını Çıktı Olarak Ver (Guncel v4)
        uses: actions/upload-artifact@v4
        with:
          name: Dayanc-GNav-Calisan-Uygulama
          path: build/app/outputs/flutter-apk/app-release.apk
          
