name: Flutter APK Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. Adım: Flutter'ı kur
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          
      # 2. Adım: Yeni bir Flutter projesi oluştur (eksik dosyaları bu tamamlayacak)
      - name: Create flutter project
        run: |
          flutter create temp_app
          cp -r lib/ temp_app/
          cp pubspec.yaml temp_app/
          
      # 3. Adım: Projenin içine gir ve APK al
      - name: Build APK
        run: |
          cd temp_app
          flutter pub get
          flutter build apk --release
          
      # 4. Adım: APK dosyasını sana gönder
      - uses: actions/upload-artifact@v4
        with:
          name: Uygulamam-APK
          path: temp_app/build/app/outputs/flutter-apk/app-release-apk.apk
