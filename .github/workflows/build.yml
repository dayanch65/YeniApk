name: Flutter Otomatik Android ve Izin Oluşturucu

on: [push] # GitHub'a kodu yüklediğin an çalışır

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Java Kurulumu
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter Kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 1. ADIM: GitHub senin için tüm Android klasörünü sıfırdan oluşturuyor
      - name: Android Klasörünü Sıfırdan Yarat
        run: flutter create --platforms=android .

      # 2. ADIM: Sesli arama için gereken Mikrofon ve Wi-Fi izinlerini koda enjekte ediyor
      - name: Android Izinlerini Otomatik Enjekte Et
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          PERMISSIONS="<uses-permission android:name=\"android:permission.INTERNET\"/>\n    <uses-permission android:name=\"android:permission.RECORD_AUDIO\"/>\n    <uses-permission android:name=\"android:permission.MODIFY_AUDIO_SETTINGS\"/>\n    <uses-permission android:name=\"android:permission.ACCESS_WIFI_STATE\"/>"
          sed -i "s|<manifest[^>]*>|&\n    $PERMISSIONS|" $MANIFEST_PATH

      # 3. ADIM: Uygulamayı test edebilmen için APK çıktısı üretiyor
      - name: APK Çıktısı Üret
        run: flutter build apk --debug

      # 4. ADIM: Üretilen APK'yı GitHub Actions panelinden indirilebilir yapıyor
      - name: APK'yi Yukle
        uses: actions/upload-artifact@v4
        with:
          name: sesli-arama-uygulamasi
          path: build/app/outputs/flutter-apk/app-debug.apk
          
