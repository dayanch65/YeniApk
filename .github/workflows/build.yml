name: Flutter APK Uretici

on:
  push:
    branches: [ "main" ] # Kod yüklendiğinde otomatik başlar

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v3

      - name: Java Kurulumu
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter Kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 1. SİHİR: Senin koymadığın Android klasörlerini yoktan var eder
      - name: Android Dosyalarini Olustur
        run: flutter create .

      # 2. SİHİR: İnternet ve Mikrofon izinlerini zorla Android koduna enjekte eder
      - name: Izinleri Ekle (Internet ve Mikrofon)
        run: |
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>' android/app/src/main/AndroidManifest.xml

      - name: Paketleri Indir
        run: flutter pub get

      - name: APK Derle
        run: flutter build apk --release

      - name: APK'yi Github'a Yukle
        uses: actions/upload-artifact@v3
        with:
          name: SesliArama-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          
