name: Superr Cached Flutter Builder
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Flutter SDK'yi GitHub'a İndir
        run: git clone https://github.com/flutter/flutter.git -b stable C:\flutter

      - name: Tüm Eksik Motor ve Cache Dosyalarını Tamamen Yükle
        run: |
          cd C:\flutter
          .\bin\flutter.bat precache --all-platforms

      - name: Her Şeyi Tek Bir ZIP Dosyası Yap
        run: Compress-Archive -Path C:\flutter -DestinationPath C:\flutter_hazir.zip

      - name: Hazır Paketi İndirme Bağlantısı Olarak Sun
        uses: actions/upload-artifact@v4
        with:
          name: flutter-windows-tam-paket
          path: C:\flutter_hazir.zip
          
