name: Super Cached Flutter Builder
on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Flutter SDKyi GitHuba Indir
        shell: pwsh
        run: git clone https://github.com/flutter/flutter.git -b stable C:\flutter

      - name: Tum Eksik Motor ve Cache Dosyalarini Yukle
        shell: pwsh
        run: |
          cd C:\flutter
          .\bin\flutter.bat precache --all-platforms

      - name: Her Seyi Tek Bir ZIP Dosyasi Yap
        shell: pwsh
        run: Compress-Archive -Path C:\flutter -DestinationPath C:\flutter_hazir.zip

      - name: Hazir Paketi Indirme Baglantisi Olarak Sun
        uses: actions/upload-artifact@v4
        with:
          name: flutter-windows-tam-paket
          path: C:\flutter_hazir.zip
          
